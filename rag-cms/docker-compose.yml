services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragcms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ragcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragcms}
      POSTGRES_DB: ${POSTGRES_DB:-ragcms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ragcms}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
