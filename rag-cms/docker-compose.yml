services:
  postgres:
    image: postgres:16-alpine
    container_name: ragcms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ragcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragcms}
      POSTGRES_DB: ${POSTGRES_DB:-ragcms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ragcms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ragcms-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

volumes:
  postgres_data:
  qdrant_data:
