server {
    listen 80;
    server_name _;
    client_max_body_size 200m;

    # static SPA bundle
    root /usr/share/nginx/html;
    index index.html;

    # static assets — long cache
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API → backend container
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE stream — disable buffering, keep socket alive
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # SPA fallback — every other path serves index.html so react-router works.
    # Force browsers to revalidate index.html on every load so a new build's
    # hashed asset URLs are picked up immediately (no stale CSS / JS).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }
    location / {
        try_files $uri /index.html;
    }
}
