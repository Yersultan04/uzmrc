services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragcms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Default: 127.0.0.1:5432 (только для отладки с самого сервера).
      # Bank deploy переопределяет: POSTGRES_BIND=0.0.0.0 POSTGRES_PORT=14005
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
    container_name: ragcms-backend
    restart: unless-stopped
    ports:
      # Default: 127.0.0.1:8000 — нужен только для прямого debug-доступа к /docs.
      # В нормальной работе backend дёргается через frontend nginx → /api.
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATA_DIR: /data
      CORS_ORIGINS: ${CORS_ORIGINS:-https://rag-cms.eskender.tech}
      MAX_UPLOAD_MB: "200"
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      VOYAGE_EMBED_MODEL: ${VOYAGE_EMBED_MODEL:-voyage-3}
      VOYAGE_EMBED_DIM: ${VOYAGE_EMBED_DIM:-1024}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-voyage}
      EMBED_API_BASE_URL: ${EMBED_API_BASE_URL:-}
      EMBED_API_KEY: ${EMBED_API_KEY:-}
      EMBED_MODEL_NAME: ${EMBED_MODEL_NAME:-}
      EMBED_DIM: ${EMBED_DIM:-1024}
      EMBED_RPM: ${EMBED_RPM:-0}
      EMBED_TPM: ${EMBED_TPM:-0}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      # Hybrid loop: fast model drives the agent steps (tool selection / search),
      # the RAG's quality model synthesizes & streams the final answer. Enables
      # token streaming + a faster loop. Unset → single-model (no streaming).
      AGENT_STEP_MODEL: ${AGENT_STEP_MODEL:-}
      RERANK_API_BASE_URL: ${RERANK_API_BASE_URL:-}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
      LLM_RERANK_MODEL: ${LLM_RERANK_MODEL:-openai/gpt-4o-mini}
      LLM_VISION_MODEL: ${LLM_VISION_MODEL:-openai/gpt-4o-mini}
      LLM_FALLBACK_API_BASE_URL: ${LLM_FALLBACK_API_BASE_URL:-}
      LLM_FALLBACK_API_KEY: ${LLM_FALLBACK_API_KEY:-}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-}
      CONTEXTUAL_ENRICHMENT: ${CONTEXTUAL_ENRICHMENT:-false}
      INGEST_OCR_FALLBACK: ${INGEST_OCR_FALLBACK:-true}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-24}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      DEFAULT_FTS_LANGUAGE: ${DEFAULT_FTS_LANGUAGE:-simple}
      # Interactive API docs (/docs, /redoc) off by default — public demo safety.
      EXPOSE_DOCS: ${EXPOSE_DOCS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - rag_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
    container_name: ragcms-frontend
    restart: unless-stopped
    ports:
      # Default: 127.0.0.1:8081 — host nginx terminates TLS and proxies here (eskender.tech prod).
      # For direct exposure (e.g. bank server) override in .env:
      #   FRONTEND_BIND=0.0.0.0
      #   FRONTEND_PORT=14001
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-8081}:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:
  rag_data:
